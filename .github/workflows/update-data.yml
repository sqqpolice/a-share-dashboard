# A股行业轮动与资金流向监控 · 自动化抓取 + 部署
# 每个交易日 16:30（北京时间 = 08:30 UTC）自动：
#   1) 抓取真实行情（腾讯指数 + 东方财富板块/概念/K线/北向），服务端算 MA20/MACD
#   2) 提交 data.json（当日快照）+ history.json（跨日累积趋势）到仓库
#   3) 将 index.html + 数据文件部署到 CloudBase 静态托管（站点即更新）
# 支持手动触发（workflow_dispatch）。
# 部署需要仓库 Secrets：CLOUDBASE_SECRET_ID / CLOUDBASE_SECRET_KEY / CLOUDBASE_ENV_ID
# （在 CloudBase 控制台「用户中心 → 访问密钥」生成；ENV_ID = stock711-d9g478sq2cb9ff1b5）
# 未配置密钥时，仅提交数据（可用于 jsDelivr 兜底，见 index.html 的 CDN_BASE）。

name: Update A-Share Data & Deploy

on:
  schedule:
    # 周一至周五 08:30 UTC = 北京时间 16:30（收盘后）
    - cron: '30 8 * * 1-5'
  workflow_dispatch:  # 手动触发

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          # 必须用 GITHUB_TOKEN，否则后续 push 无权限 → exit code 128
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch real-time A-share data
        run: python fetch_a股.py
        continue-on-error: true  # API 临时不可用时跳过，不阻断部署

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # 确认远程 URL 含 token（actions/checkout@v4 + persist-credentials 应已自动注入）
          echo "remote url: $(git remote get-url origin)"
          echo "current branch: $(git branch --show-current)"
          git add data.json history.json
          # 仅在有实际变更时才提交（避免无数据时空提交）
          git diff --cached --quiet || git commit -m "data: auto-update $(TZ=Asia/Shanghai date +'%Y-%m-%d %H:%M')"
          # 先拉远程最新再推送
          git pull --rebase origin main 2>&1 || echo "  [warn] pull rebase failed (may be empty or up-to-date)"
          git push origin main 2>&1 || {
            echo "  [warn] normal push failed, retry with force-with-lease..."
            git push --force-with-lease origin main 2>&1
          }

      - name: Stage deployable files
        run: |
          mkdir -p dist
          cp index.html data.json history.json data.js dist/

      - name: Deploy to CloudBase static hosting
        continue-on-error: true   # 密钥未配置时跳过部署（数据已提交到仓库）
        uses: TencentCloudBase/cloudbase-action@v2
        with:
          secretId:  ${{ secrets.CLOUDBASE_SECRET_ID }}
          secretKey: ${{ secrets.CLOUDBASE_SECRET_KEY }}
          envId:     ${{ secrets.CLOUDBASE_ENV_ID }}
          staticSrcPath: dist
